<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业课辅导预约</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app-container">
        <h1>专业课辅导预约</h1>
        <div id="message"></div>

        <div id="booking-form">
            <div class="form-group">
                <label for="nickname">请输入姓名：</label>
                <input type="text" id="nickname" placeholder="例如：小猫" required>
            </div>
            
            <div class="form-group">
                <label for="access-code">请输入班级预约口令：</label>
                <input type="text" id="access-code" placeholder="周中会发送本周口令" required>
            </div>
            
            <div class="form-group">
                <label>请选择时间（单选）：</label>
                <div id="slots-container">加载中...</div>
            </div>
            
            <button id="submit-btn" onclick="submitBooking()">提交预约</button>
        </div>

        <div class="cancel-section">
            <h3>想取消预约？</h3>
            <div class="form-group">
                <input type="text" id="cancel-nickname" placeholder="输入你预约时的姓名">
            </div>
            <div class="form-group">
                <input type="text" id="cancel-code" placeholder="输入班级预约口令">
            </div>
            <button id="cancel-btn" class="danger-outline" onclick="cancelBooking()">确认取消我的预约</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
