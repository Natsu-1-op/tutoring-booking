<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业课辅导</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #sync-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
            font-size: 16px; color: #409eff; font-weight: bold;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #409eff;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .notice-board {
            background: #fff7e6; border: 2px solid #ffb036; padding: 15px 20px; 
            border-radius: 8px; margin-bottom: 20px; color: #d46b08; font-size: 14px; line-height: 1.6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .notice-board h4 { margin: 0 0 5px 0; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sync-overlay">
        <div class="spinner"></div>
        <div id="sync-text">正在连接，请稍候...</div>
    </div>

    <div class="container" id="app-container">
        <h1 id="main-title">专业课辅导</h1>
        <div id="message"></div>

        <div class="nav-btn-container">
            <button id="nav-booking-btn" onclick="switchView('booking')">我要约课</button>
            <button id="nav-history-btn" style="background: #67c23a;" onclick="switchView('history')">历史记录</button>
            <button id="nav-exam-btn" style="background: #e6a23c;" onclick="window.location.href='exam_student.html'">模拟考试</button>
        </div>

        <div id="booking-section">
            <div class="notice-board" id="notice-board" style="display: none;">
                <h4>系统公告：</h4>
                <div id="notice-content">加载中...</div>
            </div>

            <div id="booking-form" style="display: none;">
                <div class="form-group">
                    <label for="nickname">请输入姓名：</label>
                    <input type="text" id="nickname" placeholder="例如：张三" required>
                </div>
                <div class="form-group">
                    <label for="access-code">请输入班级预约口令：</label>
                    <input type="text" id="access-code" placeholder="输入班级群口令" required>
                </div>
                <div class="form-group">
                    <label>请选择辅导时间：</label>
                    <div id="slots-container">正在调取排班...</div>
                </div>
                <button id="submit-btn" onclick="submitBooking()">提交预约申请</button>
            </div>
        </div>

        <div id="history-section" style="display: none;">
            <div class="form-group" style="background: #fdfdfe; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 20px;">
                <label style="font-size: 14px; color: #555; font-weight: bold;">历史约课身份验证：</label>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <input type="text" id="history-search-name" placeholder="请输入预约时填写的真实姓名">
                    <input type="text" id="history-search-code" placeholder="请输入任意一次约课的凭证码（大写5位）">
                    <button onclick="loadMyHistory()" style="background: #409eff; font-size: 15px; font-weight: bold; padding: 10px 0;">验证并调取记录</button>
                </div>
            </div>
            <div id="history-container"><p style="text-align: center; color: #999; padding: 20px;">请输入姓名与凭证码进行查询。</p></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="config/firebase-env.js"></script>
    <script src="utils/time-parser.js"></script>
    <script src="app.js"></script>
</body>
</html>
