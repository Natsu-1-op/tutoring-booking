<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业课辅导预约</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notice-board {
            background: #fff7e6; border: 1px solid #ffd591; padding: 15px 20px; 
            border-radius: 8px; margin-bottom: 20px; color: #d46b08; font-size: 14px; line-height: 1.6;
        }
        .notice-board h4 { margin: 0 0 5px 0; font-size: 15px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="container" id="app-container">
        <h1>专业课辅导预约</h1>
        <div id="message"></div>

        <div class="notice-board" id="notice-board" style="display: none;">
            <h4>公告：</h4>
            <div id="notice-content">加载中...</div>
        </div>

        <div id="booking-form">
            <div class="form-group">
                <label for="nickname">请输入姓名：</label>
                <input type="text" id="nickname" placeholder="例如：丁真" required>
            </div>
            
            <div class="form-group">
                <label for="access-code">请输入班级预约口令：</label>
                <input type="text" id="access-code" placeholder="周中会发送口令" required>
            </div>
            
            <div class="form-group">
                <label>请选择时间（单选）：</label>
                <div id="slots-container">加载中...</div>
            </div>
            
            <button id="submit-btn" onclick="submitBooking()">提交预约</button>
        </div>

        <div class="cancel-section">
            <h3>想取消预约？</h3>
            <div class="form-group">
                <label style="font-size: 14px; color: #666; font-weight: normal;">1. 输入你的姓名：</label>
                <input type="text" id="cancel-nickname" placeholder="输入预约时的姓名">
            </div>
            <div class="form-group">
                <label style="font-size: 14px; color: #666; font-weight: normal;">2. 选择要取消哪天的课程：</label>
                <input type="date" id="cancel-date" style="padding: 10px;">
            </div>
            <div class="form-group">
                <label style="font-size: 14px; color: #666; font-weight: normal;">3. 输入你的 5 位专属取消凭证码：</label>
                <input type="text" id="cancel-code" placeholder="请输入成功预约时分配的5位码(不区分大小写）">
            </div>
            <button id="cancel-btn" class="danger-outline" onclick="cancelBooking()">确认取消我的预约</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
