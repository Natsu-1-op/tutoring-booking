<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约系统后台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
        .control-panel { display: flex; gap: 10px; margin-bottom: 15px; align-items: center;}
        #admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #f5f7fa; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        #admin-content { display: none; }
        .date-group { margin-bottom: 15px; border: 1px solid #dcdfe6; border-radius: 8px; overflow: hidden; background: #fff; }
        .date-header { 
            background: #f5f7fa; padding: 12px 20px; font-weight: bold; color: #409eff; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }
        .date-header:hover { background: #ebf5ff; }
        .date-body { padding: 15px 20px; }
        .date-body.collapsed { display: none; }
        .arrow-indicator { font-size: 14px; color: #909399; }
        .reservation-item { padding: 15px; border: 1px dashed #e0e0e0; border-radius: 6px; margin-bottom: 10px; background: #fafafa;}
        .reservation-item:last-child { margin-bottom: 0; }
        .reservation-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; font-size: 14px; margin-bottom: 10px;}
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: #fff;}
        .status-pending { background: #e6a23c; }
        .status-confirmed { background: #67c23a; }
        .status-cancelled { background: #909399; }
        .status-completed { background: #409eff; }
        .history-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; margin-bottom: 8px; background: #fff; font-size: 13px;}
        .history-card:last-child { margin-bottom: 0; }
        .card-row { margin-bottom: 4px; }
        .card-row:last-child { margin-bottom: 0; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; resize: vertical; font-family: inherit;}
        select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff;}
        input[type="text"] { padding: 8px 12px; }
        .whitelist-item { display: inline-flex; align-items: center; gap: 6px; background: #f4f4f5; color: #606266; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin: 0 6px 6px 0; border: 1px solid #e4e7ed;}
        .whitelist-item span.remove-btn { color: #f56c6c; cursor: pointer; font-weight: bold; font-size: 14px;}
        .whitelist-item span.remove-btn:hover { color: #b71c1c; }
    </style>
</head>
<body>

    <div id="admin-login">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2>管理员身份验证</h2>
            <input type="password" id="admin-password" placeholder="请输入管理员密码" style="text-align: center; margin: 15px 0;">
            <button id="btn-login" onclick="verifyAdmin()">登录系统</button>
            <p id="login-error" class="error" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div class="container" id="admin-content">
        <div class="admin-header">
            <h2>预约管理后台</h2>
            <a href="exam_teacher.html" style="background: #409eff; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: bold;">进入命题与阅卷系统 →</a>
        </div>

        <div class="form-group" style="background: #fdfdfe; padding: 15px; border: 1px dashed #cbd5e1; border-radius: 8px; margin-bottom: 20px;">
            <label style="color:#334155;">学年维度分流切换：</label>
            <div style="display:flex; gap:10px; margin-top:5px; align-items:center;">
                <select id="admin-year-select" style="font-weight: bold; color: #1e293b;"></select>
                <button id="btn-set-active" style="width:auto; padding:8px 15px; font-size:14px; background:#67c23a;">设为当前激活学年</button>
                <button id="btn-create-year" style="width:auto; padding:8px 15px; font-size:14px; background:#409eff;">新建新学年数据节点</button>
            </div>
        </div>

        <div class="form-group">
            <label>通知公告板：</label>
            <textarea id="notice-input" placeholder="输入公告文字内容..."></textarea>
            <div style="margin-top: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="notice-img-input" placeholder="可贴入合法海报图片 URL 地址 (留空则不展示)">
                <button id="btn-set-notice" style="width:auto; padding:8px 15px; font-size:14px;">发布并同步公告</button>
            </div>
        </div>

        <div class="form-group" style="background: #fafafa; padding:15px; border:1px solid #e2e8f0; border-radius:8px;">
            <label>准入鉴权白名单：</label>
            <div id="whitelist-display" style="margin-bottom:10px; padding:8px; background:#fff; border:1px solid #e2e8f0; border-radius:6px; min-height:42px;">加载中...</div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-student-name" placeholder="输入同学真实姓名 (如：丁真)" style="flex:1;">
                <button id="btn-add-student" style="width:auto; padding:0 20px; font-size:14px; background:#67c23a;">添加至白名单</button>
            </div>
        </div>

        <div class="form-group" style="border-top:1px solid #eee; padding-top:15px;">
            <label>快捷排班工具：</label>
            <div class="control-panel">
                <input type="text" id="batch-date-text" placeholder="输入日期文本，例如: 7/7" style="width: 180px;">
                <button id="btn-gen-tpl" style="background: #e6a23c;">一键生成该日标准班次</button>
            </div>
            <div class="control-panel" style="margin-bottom: 25px;">
                <input type="text" id="slot-time-text" placeholder="手动添加特定时段，例如: 7/7 14:00-15:00">
                <button id="btn-add-slot">+ 追加该排班</button>
            </div>
        </div>

        <div class="form-group" style="display: flex; gap: 15px; align-items: center; border-top:1px solid #eee; padding-top:15px;">
            <div>
                <label>预约截止死线：</label>
                <input type="datetime-local" id="deadline-input" style="width: 220px;">
                <button id="btn-set-deadline" style="width:auto; padding:8px 15px; font-size:14px; margin-left:8px;">设定死线</button>
            </div>
            <div style="border-left: 1px solid #ddd; padding-left:15px;">
                <label>约课特征暗号：</label>
                <input type="text" id="access-code-input" placeholder="留空则不设限制" style="width: 160px; text-transform: uppercase;">
                <button id="btn-set-code" style="width:auto; padding:8px 15px; font-size:14px; margin-left:8px;">变更暗号</button>
            </div>
        </div>

        <div class="control-panel" style="margin-top: 25px; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <button id="btn-export-csv" style="background: #67c23a; width:auto; padding:10px 15px;">导出预约名册 (CSV)</button>
            <button id="btn-export-tutor-json" style="background: #409eff; width:auto; padding:10px 15px;">导出导师账单 (JSON)</button>
            <button id="btn-clear-year" class="danger" style="width:auto; padding:10px 15px;">清空本年度数据</button>
        </div> 
        
        <div id="admin-reservations-container">读取中...</div>
        
        <div class="date-group" style="margin-top: 30px; border-color: #909399;">
            <div class="date-header" id="btn-toggle-logs" style="background: #f4f4f5; color: #606266; border-bottom-color: #dcdfe6; cursor: pointer;">
                <span>系统操作日志 (Log)</span>
                <span class=\"arrow-indicator\" id=\"log-arrow-indicator\">展开 +</span>
            </div>
            <div class="date-body collapsed" id="admin-logs-wrapper" style="background: #fff;">
                <div style="text-align:right; margin-bottom:10px;">
                    <button class="danger" id="btn-clear-logs" style="width:auto; padding:4px 10px; font-size:12px;">清空日志</button>
                </div>
                <div id="admin-logs-container" style="background:#1e1e1e; color:#7ec699; font-family:monospace; padding:15px; border-radius:6px; max-height:300px; overflow-y:auto; font-size:12px; line-height:1.6; border:1px solid #333;">
                    加载中...
                </div>
            </div>
        </div>
        
    </div>

    <script src="config/firebase-env.js"></script>
    <script src="utils/time-parser.js"></script>
    <script src="admin.js"></script>
</body>
</html>
