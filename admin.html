<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约系统后台管理</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header { display: flex; justify-content: space-between; align-items: center; }
        .control-panel { display: flex; gap: 10px; margin-bottom: 15px; align-items: center;}
        #admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #f5f7fa; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        #admin-content { display: none; }
        
        .date-group { margin-bottom: 15px; border: 1px solid #dcdfe6; border-radius: 8px; overflow: hidden; background: #fff; }
        .date-header { 
            background: #f5f7fa; padding: 12px 20px; font-weight: bold; color: #409eff; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e4e7ed; user-select: none;
        }
        .date-header:hover { background: #edf5ff; }
        .date-body { padding: 10px 15px; display: block; }
        .date-body.collapsed { display: none; }
        
        .res-group { border-color: #ffd591; }
        .res-header { background: #fff7e6; color: #d46b08; border-bottom-color: #ffd591; }
        .res-header:hover { background: #fff2e8; }
        
        .template-panel { background: #f0f9eb; border: 1px solid #c2e7b0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .template-panel h4 { margin: 0 0 10px 0; color: #67c23a; }
        .template-slots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 10px 0 15px 0; }
        .template-slots-grid input { padding: 6px 10px; border: 1px solid #c2e7b0; border-radius: 4px; text-align: center; font-size: 13px; }
        
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; resize: vertical; font-family: inherit;}
        .edit-input { padding: 6px 10px; border: 1px solid #409eff; border-radius: 4px; font-size: 14px; width: 60%; box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; }
        table { width: 100%; border-collapse: collapse; }
    </style>
</head>
<body>
    <div id="admin-login">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h1>管理员认证</h1>
            <div class="form-group" style="margin-top: 20px;">
                <input type="password" id="admin-password" placeholder="请输入后台管理密码" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
            </div>
            <button onclick="verifyAdmin()" style="margin-top: 10px;">进入后台</button>
            <p id="login-error" style="color: red; margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="admin-content" class="container" style="max-width: 800px;">
        <div class="admin-header">
            <h1>专业课辅导 - 后台管理</h1>
        </div>

        <h2>📢 约课端公告设置</h2>
        <div class="form-group">
            <textarea id="notice-input" rows="3" placeholder="在此输入公告内容。留空并保存可隐藏学生端的公告栏。"></textarea>
            <button onclick="setNotice()" style="background:#e6a23c; margin-top: 8px; width: auto;">发布/更新公告</button>
        </div>

        <h2>🕒 时间段管理</h2>
        
        <div class="template-panel">
            <h4>⚡ 一键生成当日排班</h4>
            <div class="control-panel" style="margin-bottom: 5px;">
                <label style="font-size: 14px; color: #4f8234;">选择日期：</label>
                <input type="date" id="template-date" style="width: auto; padding: 8px;">
            </div>
            <div class="template-slots-grid">
                <input type="text" id="tpl-time-1" value="0800-1015">
                <input type="text" id="tpl-time-2" value="1030-1245">
                <input type="text" id="tpl-time-3" value="1330-1545">
                <input type="text" id="tpl-time-4" value="1600-1815">
                <input type="text" id="tpl-time-5" value="1900-2115">
            </div>
            <button onclick="generateDayTemplate()" style="background:#67c23a; width: 100%;">生成该日排班</button>
        </div>

        <div class="control-panel">
            <input type="text" id="new-slot-time" placeholder="必须以月/日开头，如：6/19 14:00-15:00">
            <button onclick="addSlot()" style="width: auto; white-space: nowrap;">新增单次</button>
        </div>
        
        <div id="admin-slots-container">加载中...</div>

        <h2>⏳ 截止时间设置</h2>
        <div class="control-panel">
            <input type="datetime-local" id="deadline-input">
            <button onclick="setDeadline()" style="width: auto;">保存截止时间</button>
        </div>

        <h2>🔑 预约口令设置</h2>
        <div class="control-panel">
            <input type="text" id="code-input" placeholder="设置新口令，如：Optic2026">
            <button onclick="setCode()" style="width: auto;">保存口令</button>
        </div>

        <h2>📋 预约情况管理</h2>
        <div class="control-panel">
            <button onclick="exportCSV()" style="background:#52c41a; width:auto;">导出表格 (CSV)</button>
            <button onclick="clearData()" class="danger">清空全部数据</button>
        </div>
        
        <div id="admin-reservations-container">加载中...</div>
        
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
